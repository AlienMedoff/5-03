global:
  resolve_timeout: 5m

route:
  group_by: [alertname]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: telegram

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: ${ALERT_BOT_TOKEN}
        chat_id: ${ALERT_CHAT_ID}
        message: |
          🚨 {{ .Status | toUpper }}
          📌 {{ .CommonAnnotations.summary }}
          📝 {{ .CommonAnnotations.description }}
          ⚠️ {{ .CommonLabels.severity }}
